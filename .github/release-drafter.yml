name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '📖 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🏠 Internal'
    labels:
      - 'internal'
      - 'chore'
      - 'ci'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/your-org/magb/compare/v$PREVIOUS_TAG...v$RESOLVED_VERSION
