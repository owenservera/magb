name: 🐛 Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Fill out the form below and we'll look into it.
        
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug in plain English. What did you expect vs. what occurred?
      placeholder: I expected X but got Y instead...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this? Step-by-step is ideal.
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Error Messages
      description: Paste any relevant output, logs, or error messages here.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: What area is affected?
      options:
        - Generation Pipeline
        - Knowledge Database
        - Validation Engine
        - Documentation
        - CLI
        - API
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Branch
      description: What version or branch are you using?
      placeholder: e.g., main, v0.1.0
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Windows 11, macOS 14, Ubuntu 22.04
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I've searched existing issues to avoid duplicates
          required: true
        - label: I've included enough information to reproduce the issue
          required: false
