version: '3.8'

services:
  # PostgreSQL Database (for local development)
  db:
    image: postgres:15-alpine
    container_name: magb-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: magb
    ports:
      - "5433:5432"
    volumes:
      - magb-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # magB Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magb-app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/magb
      - ZAI_API_KEY=${ZAI_API_KEY}
      - LOG_LEVEL=INFO
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        bunx prisma migrate deploy &&
        node server.js
      "

volumes:
  magb-db-data:
